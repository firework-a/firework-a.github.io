<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="pageTitle">GitHub Home</title>
        <style>
            *,
            *:before,
            *:after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --tauri-transition-speed: 0.2s;

                /* 字体系统 */
                --sl-font-system:
                    ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans",
                    sans-serif;
                --sl-font-system-mono:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    "Liberation Mono", "Courier New", monospace;
                --__sl-font:
                    var(--sl-font, var(--sl-font-system)), var(--sl-font-system);
                --__sl-font-mono:
                    var(--sl-font-mono, var(--sl-font-system-mono)),
                    var(--sl-font-system-mono);

                /* 文本大小 */
                --sl-text-2xs: 0.75rem;
                --sl-text-xs: 0.8125rem;
                --sl-text-sm: 0.875rem;
                --sl-text-base: 1rem;
                --sl-text-lg: 1.125rem;
                --sl-text-xl: 1.25rem;
                --sl-text-2xl: 1.5rem;
                --sl-text-3xl: 1.8125rem;
                --sl-text-4xl: 2.1875rem;
                --sl-text-5xl: 2.625rem;
                --sl-text-6xl: 4rem;
                --sl-line-height: 1.75;
                --sl-line-height-headings: 1.2;

                /* 布局尺寸 */
                --sl-content-width: 45rem;
                --sl-content-pad-x: 1rem;

                /* 色调定义 */
                --sl-hue-orange: 35;
                --sl-hue-green: 101;
                --sl-hue-blue: 187;
                --sl-hue-purple: 281;
                --sl-hue-red: 339;

                /* 暗色模式默认值 */
                --sl-color-white: hsl(0, 0%, 100%);
                --sl-color-gray-1: hsl(224, 20%, 94%);
                --sl-color-gray-2: hsl(224, 6%, 77%);
                --sl-color-gray-3: hsl(224, 6%, 56%);
                --sl-color-gray-4: hsl(224, 7%, 36%);
                --sl-color-gray-5: hsl(224, 10%, 23%);
                --sl-color-gray-6: hsl(224, 14%, 16%);
                --sl-color-black: hsl(224, 10%, 10%);

                --sl-color-accent-hue: var(--sl-hue-blue);
                --sl-color-accent-low: hsl(
                    var(--sl-color-accent-hue),
                    71%,
                    15%
                );
                --sl-color-accent: hsl(var(--sl-color-accent-hue), 100%, 60%);
                --sl-color-accent-high: hsl(
                    var(--sl-color-accent-hue),
                    71%,
                    90%
                );

                --sl-color-orange-low: hsl(var(--sl-hue-orange), 100%, 15%);
                --sl-color-orange: #ffc131;
                --sl-color-orange-high: hsl(var(--sl-hue-orange), 100%, 90%);
                --sl-color-blue: #24c8db;

                --sl-color-text: var(--sl-color-gray-2);
                --sl-color-text-accent: var(--sl-color-accent-high);
                --sl-color-bg: var(--sl-color-black);
                --sl-color-bg-nav: var(--sl-color-gray-6);
                --sl-color-hairline: var(--sl-color-gray-6);
            }

            /* 亮色模式 */
            :root[data-theme="light"] {
                color-scheme: light;
                --sl-color-accent-hue: 207;
                --sl-color-white: hsl(224, 10%, 10%);
                --sl-color-black: hsl(0, 0%, 100%);
                --sl-color-gray-1: hsl(224, 14%, 16%);
                --sl-color-gray-2: hsl(224, 10%, 23%);
                --sl-color-gray-3: hsl(224, 7%, 36%);
                --sl-color-gray-4: hsl(224, 6%, 56%);
                --sl-color-gray-5: hsl(224, 6%, 77%);
                --sl-color-gray-6: hsl(224, 20%, 94%);

                --sl-color-accent-low: hsl(
                    var(--sl-color-accent-hue),
                    100%,
                    90%
                );
                --sl-color-accent: hsl(var(--sl-color-accent-hue), 100%, 50%);
                --sl-color-accent-high: hsl(
                    var(--sl-color-accent-hue),
                    71%,
                    15%
                );
                --sl-color-text: var(--sl-color-gray-2);
                --sl-color-text-accent: var(--sl-color-accent-high);
                --sl-color-bg: var(--sl-color-black);
                --sl-color-bg-nav: var(--sl-color-gray-6);
                --sl-color-hairline: var(--sl-color-gray-6);
            }

            /* --- 响应式布局断点 --- */
            @media (min-width: 50em) {
                :root {
                    --sl-text-h1: var(--sl-text-5xl);
                    --sl-text-h2: var(--sl-text-4xl);
                    --sl-text-h3: var(--sl-text-3xl);
                    --sl-text-h4: var(--sl-text-2xl);
                }
            }

            @media (min-width: 72rem) {
                :root {
                    --sl-content-pad-x: 1.5rem;
                }
            }

            /* 针对低高度屏幕（笔记本/平板竖屏）的优化 */
            @media (max-height: 800px) {
                .blog-container {
                    padding-top: 3rem;
                    padding-bottom: 3rem;
                }
                h1 {
                    font-size: var(--sl-text-4xl);
                }
            }

            @media (max-width: 48rem) {
                .blog-container {
                    padding-left: 1.25rem;
                    padding-right: 1.25rem;
                }
                .theme-toggle {
                    top: 0.75rem;
                    right: 0.75rem;
                }
            }

            body {
                font-family: var(--__sl-font);
                line-height: var(--sl-line-height);
                color: var(--sl-color-text);
                background-color: var(--sl-color-bg);
                transition: background-color var(--tauri-transition-speed);
                min-height: 100vh;
                position: relative;
                overflow-x: hidden;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            /* 背景 */
            .hero-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                opacity: 0.7;
                overflow: hidden;
                transform: translateZ(0);
                will-change: transform, opacity;
                contain: layout style paint;
                background:
                    linear-gradient(
                        -90deg,
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        -90deg,
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        transparent 6px,
                        transparent 6px,
                        transparent 156px,
                        transparent 156px
                    ),
                    linear-gradient(
                        -90deg,
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        -90deg,
                        transparent 6px,
                        transparent 6px,
                        transparent 156px,
                        transparent 156px
                    ),
                    linear-gradient(
                        var(--sl-color-gray-6) 1px,
                        transparent 1px
                    ),
                    transparent;
                background-size:
                    32px 32px,
                    32px 32px,
                    256px 256px,
                    256px 256px,
                    256px 256px,
                    256px 256px,
                    256px 256px,
                    256px 256px;
            }

            .hero-bg:after {
                content: "";
                position: absolute;
                inset: 70% 0 0;
                background: linear-gradient(transparent, var(--sl-color-bg));
            }

            .bg-grad {
                position: absolute;
                top: -50%;
                left: 50%;
                width: 150vh;
                height: 150vh;
                opacity: 0.3;
                background: radial-gradient(
                    circle,
                    var(--sl-color-accent) 0%,
                    transparent 70%
                );
                animation: optimizedIntro 6s cubic-bezier(0.4, 0, 0.2, 1)
                    forwards;
                will-change: transform, opacity;
                transform: translateZ(0);
            }

            .bg-grad-red {
                position: absolute;
                top: 0%;
                left: -50%;
                width: 150vh;
                height: 150vh;
                opacity: 0.3;
                background: radial-gradient(
                    circle,
                    var(--sl-color-orange) 0%,
                    transparent 70%
                );
                animation: optimizedIntroOrange 14s cubic-bezier(0.4, 0, 0.2, 1)
                    forwards;
                will-change: transform, opacity;
                transform: translateZ(0);
            }

            @keyframes optimizedIntro {
                0% {
                    transform: scale(1.8) translateZ(0);
                    opacity: 0;
                }
                100% {
                    transform: scale(1.1) translateZ(0);
                    opacity: 0.3;
                }
            }

            @keyframes optimizedIntroOrange {
                0% {
                    transform: scale(1.8) translateZ(0);
                    opacity: 0;
                }
                100% {
                    transform: scale(1.1) translateZ(0);
                    opacity: 0.3;
                }
            }

            /* 主题切换控件 */
            .theme-toggle {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 1000;
                display: flex;
                gap: 0.25rem;
                background: var(--sl-color-bg-nav);
                border: 1px solid var(--sl-color-hairline);
                border-radius: 9999px;
                padding: 0.35rem;
                backdrop-filter: blur(10px);
                transform: translateZ(0);
            }

            .theme-toggle button {
                background: none;
                border: none;
                color: var(--sl-color-text);
                cursor: pointer;
                padding: 0.4rem;
                border-radius: 50%;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                transition: all var(--tauri-transition-speed);
                line-height: 1;
            }

            .theme-toggle button:hover {
                background: var(--sl-color-gray-5);
            }

            .theme-toggle button.active {
                background: var(--sl-color-accent);
                color: var(--sl-color-accent-low);
            }

            .theme-toggle svg {
                width: 1.1rem;
                height: 1.1rem;
                display: block;
            }

            /* 内容 */
            .blog-container {
                position: relative;
                z-index: 1;
                max-width: var(--sl-content-width);
                margin: 0 auto;
                padding: 6rem 2rem 2rem 2rem;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            header {
                margin-bottom: 2.5rem;
            }

            h1 {
                font-size: var(--sl-text-5xl);
                line-height: var(--sl-line-height-headings);
                margin-bottom: 1rem;
                color: var(--sl-color-text);
                font-weight: 700;
            }

            .subtitle {
                font-size: var(--sl-text-xl);
                color: var(--sl-color-accent);
                margin-bottom: 0.5rem;
                font-weight: 500;
            }

            .intro {
                font-size: var(--sl-text-lg);
                line-height: 1.8;
                color: var(--sl-color-gray-3);
                margin-bottom: 2.5rem;
                max-width: 40rem;
            }

            .skills-section {
                margin-bottom: 2.5rem;
            }

            .section-title {
                font-size: var(--sl-text-sm);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--sl-color-gray-4);
                margin-bottom: 1rem;
                font-weight: 600;
            }

            .skill-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .skill-tag {
                font-family: var(--__sl-font-mono);
                font-size: var(--sl-text-xs);
                background: color-mix(
                    in srgb,
                    var(--sl-color-gray-6) 60%,
                    transparent
                );
                color: var(--sl-color-gray-2);
                padding: 0.35rem 0.75rem;
                border-radius: 0.375rem;
                border: 1px solid var(--sl-color-hairline);
                cursor: pointer;
            }

            .skill-tag:hover {
                border-color: var(--sl-color-accent);
            }

            .project-card {
                background: color-mix(
                    in srgb,
                    var(--sl-color-bg-nav) 60%,
                    transparent
                );
                border: 1px solid var(--sl-color-hairline);
                border-radius: 0.75rem;
                padding: 1.5rem;
                margin-bottom: 1rem;
                transition: all var(--tauri-transition-speed);
            }

            .project-card:hover {
                border-color: var(--sl-color-accent);
                transform: translateY(-3px);
            }

            .project-card h3 {
                font-size: var(--sl-text-lg);
                color: var(--sl-color-text);
                margin-bottom: 0.5rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .project-card h3 svg {
                width: 1.25rem;
                height: 1.25rem;
                color: var(--sl-color-accent);
            }

            .project-card p {
                font-size: var(--sl-text-sm);
                color: var(--sl-color-gray-3);
                line-height: 1.6;
                margin-bottom: 1rem;
            }

            .project-links {
                display: flex;
                gap: 1rem;
            }

            .project-link {
                font-size: var(--sl-text-xs);
                color: var(--sl-color-accent);
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 0.25rem;
            }

            .project-link:hover {
                text-decoration: underline;
            }

            .project-link svg {
                width: 1rem;
                height: 1rem;
            }

            footer {
                margin-top: 3rem;
                padding-top: 1.5rem;
                border-top: 1px solid var(--sl-color-hairline);
                font-size: var(--sl-text-sm);
                color: var(--sl-color-gray-4);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .social-links {
                display: flex;
                gap: 1rem;
            }

            .social-links a {
                color: var(--sl-color-gray-3);
                transition: color var(--tauri-transition-speed);
            }

            .social-links a:hover {
                color: var(--sl-color-accent);
            }

            .social-links svg {
                width: 1.25rem;
                height: 1.25rem;
            }

            /* 加载骨架屏 */
            .loading-skeleton {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .skeleton-card {
                background: color-mix(
                    in srgb,
                    var(--sl-color-bg-nav) 60%,
                    transparent
                );
                border: 1px solid var(--sl-color-hairline);
                border-radius: 0.75rem;
                padding: 1.5rem;
                animation: skeleton-loading 1.5s ease-in-out infinite;
            }

            .skeleton-card::before {
                content: "";
                display: block;
                height: 1.25rem;
                background: linear-gradient(
                    90deg,
                    var(--sl-color-gray-5) 25%,
                    var(--sl-color-gray-4) 50%,
                    var(--sl-color-gray-5) 75%
                );
                background-size: 200% 100%;
                border-radius: 0.375rem;
                margin-bottom: 0.75rem;
                animation: shimmer 1.5s infinite;
            }

            .skeleton-card::after {
                content: "";
                display: block;
                height: 0.875rem;
                background: linear-gradient(
                    90deg,
                    var(--sl-color-gray-5) 25%,
                    var(--sl-color-gray-4) 50%,
                    var(--sl-color-gray-5) 75%
                );
                background-size: 200% 100%;
                border-radius: 0.375rem;
                width: 75%;
                animation: shimmer 1.5s infinite;
            }

            @keyframes shimmer {
                0% {
                    background-position: -200% 0;
                }
                100% {
                    background-position: 200% 0;
                }
            }

            @keyframes skeleton-loading {
                0%, 100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.7;
                }
            }

            /* 空状态 */
            .empty-state {
                text-align: center;
                padding: 3rem 1.5rem;
                color: var(--sl-color-gray-4);
            }

            .empty-state svg {
                width: 3rem;
                height: 3rem;
                margin-bottom: 1rem;
                opacity: 0.5;
            }

            .empty-state p {
                font-size: var(--sl-text-sm);
            }
        </style>
    </head>
    <body>
        <!-- 主题切换控件 -->
        <div class="theme-toggle">
            <button
                id="lightMode"
                class="active"
                onclick="setTheme('light')"
                aria-label="切换到亮色模式"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <button
                id="darkMode"
                onclick="setTheme('dark')"
                aria-label="切换到暗色模式"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </div>

        <!-- 背景效果 -->
        <div class="hero-bg">
            <div class="bg-grad"></div>
            <div class="bg-grad-red"></div>
        </div>

        <!-- 内容 -->
        <main class="blog-container">
            <header>
                <p class="subtitle" id="subtitle"></p>
                <h1 id="displayName"></h1>
                <p class="intro" id="intro"></p>
            </header>

            <section class="skills-section">
                <h2 class="section-title">Tech Stack & Focus</h2>
                <div class="skill-tags" id="skillTags"></div>
            </section>

            <section class="projects-section">
                <h2 class="section-title">Featured Projects</h2>
                <div id="projectsContainer">
                    <!-- 加载骨架屏 -->
                    <div id="loadingSkeleton" class="loading-skeleton">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                    <!-- 空状态 -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            <line x1="2" y1="9" x2="22" y2="9"></line>
                        </svg>
                        <p>暂无公开仓库</p>
                    </div>
                </div>
            </section>

            <footer>
                <span id="copyright"></span>
                <div class="social-links">
                    <a id="githubLink" href="#" aria-label="GitHub">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"
                            />
                        </svg>
                    </a>
                </div>
            </footer>
        </main>

        <script>
            /* ========== 配置常量 ========== */
            const CONFIG = {
                USER_NAME: "firework-a",
                SITE_TITLE: "GitHub Home",
                DISPLAY_NAME: "firework-a",
                SUBTITLE: "Hello World, I'm",
                INTRO:
                    "A passionate Frontend Developer focused on building high-performance web applications and exploring the intersection of design and technology.",
                FOOTER_COPYRIGHT: "© 2026 firework-a",
                GITHUB_URL: "https://github.com/firework-a",
                SKILLS: [
                    "Javascript",
                    "TypeScript",
                    "Vue",
                    "React / Next.js",
                    "Node.js",
                    "Goland",
                    "Rust",
                    "Python / FastAPI",
                    "Agent",
                ],
            };

            let projects = [];
            let isLoading = false;

            function $(selector) {
                const el = document.querySelector(selector);

                return {
                    el,
                    on(event, handler) {
                        el?.addEventListener(event, handler);
                        return this;
                    },
                    addClass(cls) {
                        el?.classList.add(cls);
                        return this;
                    },
                    removeClass(cls) {
                        el?.classList.remove(cls);
                        return this;
                    },
                    toggleClass(cls) {
                        el?.classList.toggle(cls);
                        return this;
                    },
                    html(content) {
                        if (content !== undefined) {
                            el.innerHTML = content;
                            return this;
                        }
                        return el.innerHTML;
                    },
                    val(value) {
                        if (value !== undefined) {
                            el.value = value;
                            return this;
                        }
                        return el.value;
                    },
                };
            }

            /* ========== 初始化页面内容 ========== */
            function initPageContent() {
                document.title = CONFIG.SITE_TITLE;
                document.getElementById("pageTitle").textContent =
                    CONFIG.SITE_TITLE;
                document.getElementById("subtitle").textContent =
                    CONFIG.SUBTITLE;
                document.getElementById("displayName").textContent =
                    CONFIG.DISPLAY_NAME;
                document.getElementById("intro").textContent = CONFIG.INTRO;
                document.getElementById("copyright").textContent =
                    CONFIG.FOOTER_COPYRIGHT;
                document.getElementById("githubLink").href = CONFIG.GITHUB_URL;
            }

            /* ========== 加载 GitHub 仓库列表 ========== */
            async function loadRepos(username) {
                isLoading = true;
                showLoading();

                try {
                    const res = await fetch(
                        `https://api.github.com/users/${username}/repos?sort=updated&per_page=100`,
                        {
                            headers: {
                                "User-Agent": "github-repo-loader",
                            },
                        },
                    );

                    if (!res.ok) {
                        throw new Error(`GitHub API error: ${res.status}`);
                    }

                    const repos = await res.json();

                    projects = repos.map((repo) => ({
                        title: repo.name,
                        description: repo.description || "暂无描述",
                        link: repo.html_url,
                    }));

                    renderProjects();
                } catch (err) {
                    console.error("获取仓库失败：", err.message);
                    showEmptyState();
                } finally {
                    isLoading = false;
                }
            }

            /* ========== 显示加载状态 ========== */
            function showLoading() {
                const loadingSkeleton =
                    document.getElementById("loadingSkeleton");
                const emptyState = document.getElementById("emptyState");
                const projectsList =
                    document.querySelectorAll(".project-card");

                if (loadingSkeleton) {
                    loadingSkeleton.style.display = "flex";
                }
                if (emptyState) {
                    emptyState.style.display = "none";
                }
                projectsList.forEach((card) => card.remove());
            }

            /* ========== 显示空状态 ========== */
            function showEmptyState() {
                const loadingSkeleton =
                    document.getElementById("loadingSkeleton");
                const emptyState = document.getElementById("emptyState");

                if (loadingSkeleton) {
                    loadingSkeleton.style.display = "none";
                }
                if (emptyState) {
                    emptyState.style.display = "block";
                }
            }

            /* ========== 隐藏加载状态 ========== */
            function hideLoading() {
                const loadingSkeleton =
                    document.getElementById("loadingSkeleton");
                if (loadingSkeleton) {
                    loadingSkeleton.style.display = "none";
                }
            }

            /* ========== 渲染技能标签 ========== */
            function renderSkills() {
                const container = document.getElementById("skillTags");
                container.innerHTML = CONFIG.SKILLS.map(
                    (skill) => `<span class="skill-tag">${skill}</span>`,
                ).join("");
            }

            /* ========== 渲染项目卡片 ========== */
            function renderProjects() {
                const container = document.getElementById("projectsContainer");

                if (projects.length === 0) {
                    showEmptyState();
                    return;
                }

                hideLoading();

                const projectsHTML = projects
                    .map(
                        (project) => `
                        <article class="project-card">
                            <h3>
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path
                                        d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                                    ></path>
                                </svg>
                                ${project.title}
                            </h3>
                            <p>${project.description}</p>
                            <div class="project-links">
                                <a href="${project.link}" target="_blank" class="project-link">
                                    View on GitHub
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path
                                            d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                                        ></path>
                                        <polyline points="15 3 21 3 21 9"></polyline>
                                        <line x1="10" y1="14" x2="21" y2="3"></line>
                                    </svg>
                                </a>
                            </div>
                        </article>
                    `,
                    )
                    .join("");

                // 保留骨架屏和空状态元素，只更新项目列表
                const existingCards =
                    container.querySelectorAll(".project-card");
                existingCards.forEach((card) => card.remove());

                // 插入新项目卡片到骨架屏之后
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = projectsHTML;
                while (tempDiv.firstChild) {
                    container.appendChild(tempDiv.firstChild);
                }
            }

            /* ========== 主题切换 ========== */
            function setTheme(theme) {
                const root = document.documentElement;
                const lightBtn = document.getElementById("lightMode");
                const darkBtn = document.getElementById("darkMode");

                root.removeAttribute("data-theme");

                if (theme === "light") {
                    root.setAttribute("data-theme", "light");
                    lightBtn.classList.add("active");
                    darkBtn.classList.remove("active");
                } else {
                    darkBtn.classList.add("active");
                    lightBtn.classList.remove("active");
                }

                localStorage.setItem("tauri-theme", theme);
            }

            function initTheme() {
                const savedTheme =
                    localStorage.getItem("tauri-theme") || "dark";
                setTheme(savedTheme);
            }

            function optimizeAnimations() {
                document
                    .querySelectorAll(".bg-grad, .bg-grad-red")
                    .forEach((el) => {
                        el.style.transform = "translateZ(0)";
                    });
            }

            document.addEventListener("DOMContentLoaded", () => {
                initTheme();
                initPageContent();
                optimizeAnimations();
                renderSkills();
                loadRepos(CONFIG.USER_NAME);
            });

            let resizeTimeout;
            window.addEventListener("resize", () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    optimizeAnimations();
                }, 250);
            });
        </script>
    </body>
</html>
